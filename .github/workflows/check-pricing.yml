name: Check pricing pages

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-pricing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check vendor pricing pages
        run: node scripts/check-pricing-updates.mjs

      - name: Commit pricing monitor changes
        run: |
          if git diff --quiet -- admin/pricing-monitor.json; then
            echo "No pricing monitor changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin/pricing-monitor.json
          git commit -m "Update pricing monitor status"
          git push
